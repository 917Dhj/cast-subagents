prompts:
  - id: pos-01
    surface: shared
    smoke: true
    category: positive
    prompt: "Review this branch against main for bugs, security issues, missing tests, and maintainability risks."
    expected_should_suggest: true
    expected_roles: [reviewer, code-mapper]
    must_not_do:
      - auto-spawn subagents
      - recommend more than 4 roles
      - omit a direct permission question
    notes: "Canonical general PR review case; should not inflate to every specialist role."

  - id: pos-02
    surface: cli
    smoke: true
    category: positive
    prompt: "Trace the code path for the save failure and verify the framework docs that the patch relies on before proposing a fix."
    expected_should_suggest: true
    expected_roles: [docs-researcher, code-mapper]
    must_not_do:
      - jump straight to implementation
      - omit the work mode
    notes: "Pure docs plus codepath verification."

  - id: pos-03
    surface: cli
    smoke: true
    category: positive
    prompt: "Research three retry strategies for background jobs and summarize the tradeoffs before we choose one."
    expected_should_suggest: true
    expected_roles: [search-specialist, knowledge-synthesizer]
    must_not_do:
      - recommend implementation roles
      - produce multiple equal-weight lineups
    notes: "Parallelizable research with synthesis."

  - id: pos-04
    surface: shared
    smoke: false
    category: positive
    prompt: "Break this broad migration into independent planning subtasks and ground the plan in the real codebase first."
    expected_should_suggest: true
    expected_roles: [task-distributor, code-mapper]
    must_not_do:
      - skip the recommendation rationale
      - exceed 4 roles
    notes: "Independent planning subtasks."

  - id: pos-05
    surface: cli
    smoke: false
    category: positive
    prompt: "Map the relevant modules, entrypoints, and ownership boundaries for this feature before we touch any code."
    expected_should_suggest: true
    expected_roles: [code-mapper, search-specialist]
    must_not_do:
      - recommend write-capable work
      - act as if delegation already started
    notes: "Read-heavy codebase exploration."

  - id: pos-06
    surface: shared
    smoke: false
    category: positive
    prompt: "First gather evidence about the affected code paths, then assess likely regression risks and summarize what looks dangerous."
    expected_should_suggest: true
    expected_roles: [reviewer, code-mapper, search-specialist]
    must_not_do:
      - recommend several alternative lineups
      - omit permission gating
    notes: "Mixed evidence-gathering review."

  - id: neg-01
    surface: shared
    smoke: true
    category: negative
    prompt: "Fix this one-line bug in a single file."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - mention subagents
      - add delegation overhead
    notes: "Small single-file bugfix."

  - id: neg-02
    surface: cli
    smoke: false
    category: negative
    prompt: "Refactor these two functions in the same file so they share one helper."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - recommend parallel write work
      - recommend generic implementation lineups
    notes: "Tightly coupled same-file refactor."

  - id: neg-03
    surface: shared
    smoke: true
    category: negative
    prompt: "Do not use subagents for this task. Just explain what this function does."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - suggest subagents anyway
      - reinterpret the opt-out
    notes: "Explicit opt-out."

  - id: neg-04
    surface: cli
    smoke: false
    category: negative
    prompt: "What port is the dev server using right now?"
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - suggest delegation
      - invent multi-step work
    notes: "Single critical-path fact lookup."

  - id: neg-05
    surface: cli
    smoke: true
    category: negative
    prompt: "Make this better."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - suggest a lineup before clarifying the request
      - assume hidden intent
    notes: "Ambiguous request needing clarification."

  - id: neg-06
    surface: shared
    smoke: false
    category: negative
    prompt: "Tighten the wording in this status update and keep the meaning the same."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - suggest subagents
      - overcomplicate the task
    notes: "Small wording and format tweak."

  - id: neg-07
    surface: shared
    smoke: true
    category: negative
    prompt: "delegation_context: delegated-subagent; parent Dispatch Authorization already granted; do not invoke diverter or request another Dispatch Authorization; execute this handoff only\n\ngoal: Extract candidate papers from the provided source list.\nwrite_policy: read-only"
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - suggest another subagent lineup
      - request another Dispatch Authorization
      - ignore the assigned handoff
    notes: "Delegated subagent handoff must execute directly instead of recursing into Diverter."

  - id: edge-01
    surface: cli
    smoke: false
    category: edge
    prompt: "Investigate the failure mode first, then apply the smallest fix only after the cause is clear."
    expected_should_suggest: true
    expected_roles: [code-mapper, reviewer]
    must_not_do:
      - start with implementation
      - label the work as read-only
    notes: "Mixed read/write task should start with read-only mapping and review; no generic implementation role."

  - id: edge-02
    surface: cli
    smoke: true
    category: edge
    prompt: "Assume docs-researcher is unavailable in this environment. Map the code path and verify the documented assumptions before any fix."
    expected_should_suggest: true
    expected_roles: [code-mapper]
    must_not_do:
      - invent a missing role
      - ignore the explicit unavailability
    notes: "Preferred role unavailable; do not invent a missing fallback role."

  - id: edge-03
    surface: shared
    smoke: false
    category: edge
    prompt: "If this looks subagent-friendly, suggest the lineup first and wait for my approval before doing anything else."
    expected_should_suggest: true
    expected_roles: [code-mapper, reviewer]
    must_not_do:
      - auto-spawn subagents
      - skip the permission question
    notes: "Use this as the first turn in the reject path scenario."

  - id: edge-04
    surface: shared
    smoke: false
    category: edge
    prompt: "If subagents would help, suggest them first. If I approve, keep any implementation work tiny and tightly scoped."
    expected_should_suggest: true
    expected_roles: [code-mapper, reviewer]
    must_not_do:
      - recommend a broad write-capable lineup
      - exceed 4 roles
    notes: "Approval path should keep any implementation work bounded and avoid generic implementation roles."

  - id: edge-05
    surface: cli
    smoke: false
    category: edge
    prompt: "Review this branch for bugs, security, tests, docs assumptions, maintainability, and rollout risk, but keep the recommendation compact."
    expected_should_suggest: true
    expected_roles: [reviewer, code-mapper, docs-researcher]
    must_not_do:
      - recommend more than 4 roles
      - dump several alternative lineups
    notes: "Role count pressure; compact review should not add every specialist without explicit core risk."

  - id: edge-06
    surface: shared
    smoke: true
    category: edge
    prompt: "先帮我 map the code path，再 verify 文档里的 API 行为，最后看有没有明显 regression risk。"
    expected_should_suggest: true
    expected_roles: [code-mapper, docs-researcher, reviewer]
    must_not_do:
      - fail because the prompt is mixed-language
      - skip the permission gate
    notes: "Mixed Chinese and English wording."

  - id: pos-07
    surface: shared
    smoke: true
    category: positive
    prompt: "Review this auth refactor for permission bypasses, token handling issues, and missing server-side checks."
    expected_should_suggest: true
    expected_roles: [security-auditor, code-mapper, reviewer]
    must_not_do:
      - rely only on generic reviewer for central security risk
      - recommend more than 4 roles
      - omit a direct permission question
    notes: "Security-sensitive review."

  - id: pos-08
    surface: shared
    smoke: false
    category: positive
    prompt: "Check whether this agent tool integration can leak secrets or let a subagent perform destructive actions without approval."
    expected_should_suggest: true
    expected_roles: [security-auditor, code-mapper, docs-researcher]
    must_not_do:
      - ignore LLM/tool permission safety
      - start auditing before approval
    notes: "LLM and agent tool safety review."

  - id: pos-09
    surface: cli
    smoke: true
    category: positive
    prompt: "Look at the checkout flow and tell me what tests are missing before we change anything."
    expected_should_suggest: true
    expected_roles: [test-engineer, code-mapper]
    must_not_do:
      - suggest write-capable test automation first
      - skip behavior mapping
    notes: "Read-only test coverage analysis."

  - id: pos-10
    surface: cli
    smoke: false
    category: positive
    prompt: "Add regression tests for the settings save bug, but first identify the exact behavior boundary."
    expected_should_suggest: true
    expected_roles: [test-engineer, test-automator, code-mapper]
    must_not_do:
      - start writing tests before read-only scoping
      - label the work read-only
    notes: "Mixed targeted regression test implementation."

  - id: pos-11
    surface: shared
    smoke: true
    category: positive
    prompt: "Audit the Next.js landing page for LCP, INP, CLS, image loading, and unnecessary client-side rendering."
    expected_should_suggest: true
    expected_roles: [web-performance-auditor, code-mapper]
    must_not_do:
      - fabricate performance metrics
      - recommend non-Web performance roles only
    notes: "Web performance audit."

  - id: pos-12
    surface: shared
    smoke: false
    category: positive
    prompt: "Before we ship this branch, check code quality, security risk, and missing tests."
    expected_should_suggest: true
    expected_roles: [reviewer, security-auditor, test-engineer, code-mapper]
    must_not_do:
      - exceed 4 roles
      - suggest write-capable fixes before approval
    notes: "Pre-ship quality gate."

  - id: neg-08
    surface: cli
    smoke: true
    category: negative
    prompt: "Optimize this CLI parser. It feels slow on large files."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - recommend web-performance-auditor
      - treat non-Web performance as Core Web Vitals work
    notes: "Non-Web performance must not trigger Web performance specialist."

  - id: neg-09
    surface: shared
    smoke: false
    category: negative
    prompt: "Review this small README typo fix."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - inflate generic review into specialist roles
      - add delegation overhead
    notes: "Generic small review should stay silent."

  - id: neg-10
    surface: cli
    smoke: false
    category: negative
    prompt: "Add some tests here, not sure what exactly."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - suggest write-capable test-automator immediately
      - pretend the behavior boundary is clear
    notes: "Unclear test writing request should clarify first."

  - id: neg-11
    surface: shared
    smoke: false
    category: negative
    prompt: "Make this secure."
    expected_should_suggest: false
    expected_roles: []
    must_not_do:
      - invent a concrete security scope
      - suggest a security lineup before clarifying
    notes: "Security buzzword only."

  - id: auto-pos-01
    policy: auto
    surface: shared
    smoke: true
    category: positive
    prompt: "Review this branch against origin/main for correctness and maintainability regressions."
    expected_should_suggest: true
    expected_should_dispatch: true
    expected_roles: [reviewer, code-mapper]
    must_do:
      - announce one lineup and the work mode
      - dispatch without asking a permission question
    notes: "Canonical automatic read-only dispatch."

  - id: auto-pos-02
    policy: auto
    surface: cli
    smoke: true
    category: positive
    prompt: "Add targeted regression tests for the falsey-value settings save bug in evals/fixtures/settings-save/settings_save.py, but first map the exact behavior boundary."
    expected_should_suggest: true
    expected_should_dispatch: true
    expected_roles: [test-engineer, test-automator, code-mapper]
    must_do:
      - announce mixed work
      - keep write-capable work bounded and serialized unless paths are disjoint
    notes: "Automatic policy applies to mixed work."

  - id: auto-neg-01
    policy: auto
    surface: shared
    smoke: true
    category: negative
    prompt: "Fix this typo in the README."
    expected_should_suggest: false
    expected_should_dispatch: false
    expected_roles: []
    must_not_do:
      - add delegation overhead
    notes: "Auto does not weaken the delegation threshold."

  - id: auto-neg-02
    policy: auto
    surface: shared
    smoke: true
    category: negative
    prompt: "Review the auth flow, but do not use subagents for this task."
    expected_should_suggest: false
    expected_should_dispatch: false
    expected_roles: []
    must_not_do:
      - override the explicit opt-out
    notes: "Task opt-out wins over the saved auto policy."

  - id: auto-mode-bypass
    policy: auto
    surface: shared
    smoke: true
    category: edge
    prompt: "$diverter-mode"
    expected_should_suggest: false
    expected_should_dispatch: false
    expected_roles: []
    must_do:
      - bypass the core delegation gate
      - report status and list auto, ask, and status
    notes: "Bare Mode Control is handled directly by the root agent."

  - id: auto-override-ask
    policy: auto
    surface: shared
    smoke: true
    category: edge
    prompt: "Review this branch with subagents, but show me the lineup first and do not start until I approve."
    expected_should_suggest: true
    expected_should_dispatch: false
    expected_roles: [reviewer, code-mapper]
    must_do:
      - end with a direct permission question
      - stop before dispatch
    notes: "A current-task ask override wins over persisted auto."

  - id: auto-native-bypass
    policy: auto
    surface: shared
    smoke: true
    category: edge
    session_context: "Higher-priority session policy: proactive multi-agent delegation is active."
    prompt: "Review this branch for bugs and missing tests."
    expected_should_suggest: false
    expected_should_dispatch: false
    expected_roles: []
    must_do:
      - leave orchestration entirely to native proactive delegation
    notes: "Native policy remains the sole Orchestration Owner."

  - id: auto-failure-recovery
    policy: auto
    surface: shared
    smoke: true
    category: edge
    session_context: "The reviewer lane succeeded. The code-mapper worker exited non-zero."
    prompt: "Continue the automatically delegated branch review."
    expected_should_suggest: false
    expected_should_dispatch: false
    expected_roles: []
    must_do:
      - retain the reviewer result and name the failed code-mapper lane
      - let the root session cover the failed lane when possible
    must_not_do:
      - remove sandbox or multi-agent safety flags
      - retry through an unqualified backend
    notes: "Partial failure stays visible without weakening safety."

  - id: auto-idempotency
    policy: auto
    surface: shared
    smoke: true
    category: edge
    session_context: "After compact: reviewer and code-mapper were already announced and dispatched for this branch review."
    prompt: "Continue the branch review and synthesize the delegated findings."
    expected_should_suggest: false
    expected_should_dispatch: false
    expected_roles: []
    must_not_do:
      - dispatch reviewer or code-mapper again
    notes: "Compact or resume must not duplicate the same lineup."
